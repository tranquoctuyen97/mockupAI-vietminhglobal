name: mockupai-rt

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${RT_POSTGRES_DB:-rt}
      POSTGRES_USER: ${RT_POSTGRES_USER:-rt}
      POSTGRES_PASSWORD: ${RT_POSTGRES_PASSWORD:?required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - rt-postgres:/var/lib/postgresql/data
    networks:
      - rt-internal

  rt:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/opt/rt/sbin/rt-server", "--server", "Standalone", "--port", "9000"]
    environment:
      RT_POSTGRES_HOST: ${RT_POSTGRES_HOST:-host.docker.internal}
      RT_POSTGRES_PORT: ${RT_POSTGRES_PORT:-5432}
      RT_POSTGRES_DB: ${RT_POSTGRES_DB:-rt}
      RT_POSTGRES_USER: ${RT_POSTGRES_USER:-rt}
      RT_POSTGRES_PASSWORD: ${RT_POSTGRES_PASSWORD:?required}
      RT_WEB_DOMAIN: ${RT_WEB_DOMAIN:-127.0.0.1}
      RT_WEB_PORT: ${RT_WEB_PORT:-8082}
      RT_WEB_PATH: ${RT_WEB_PATH:-/}
      RT_LOG_LEVEL: ${RT_LOG_LEVEL:-info}
    ports:
      - "127.0.0.1:${RT_WEB_PORT:-8082}:9000"
    healthcheck:
      test: ["CMD-SHELL", "perl -MIO::Socket::INET -e 'exit(IO::Socket::INET->new(PeerAddr => \"127.0.0.1\", PeerPort => 9000, Timeout => 2) ? 0 : 1)'"]
      interval: 10s
      timeout: 3s
      retries: 30
    volumes:
      - rt-var:/opt/rt/var
      - /run/mockupai-mailboxes:/run/mockupai-mailboxes:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - rt-internal
      - rt-edge

  mailbox-worker:
    build:
      context: ../..
      dockerfile: infra/rt/Dockerfile.mailbox-worker
    depends_on:
      rt:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?required}
      REDIS_URL: ${REDIS_URL:?required}
      RT_URL: ${RT_URL:-http://rt:9000}
      RT_API_TOKEN: ${RT_API_TOKEN:?required}
      MASTER_ENCRYPTION_KEY_ID: ${MASTER_ENCRYPTION_KEY_ID:?required}
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY:?required}
      MAILBOX_RUNTIME_DIR: /run/mockupai-mailboxes
      MAILBOX_SYNC_POLL_INTERVAL_MS: ${MAILBOX_SYNC_POLL_INTERVAL_MS:-60000}
    volumes:
      - mailbox-runtime:/run/mockupai-mailboxes
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - rt-internal
      - rt-edge

networks:
  rt-internal:
    internal: true
  rt-edge:

volumes:
  rt-postgres:
  rt-var:
  mailbox-runtime:
